<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBuddy — Sign In or Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-wrap { min-height: calc(100vh - 100px); display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
        .auth-card { max-width: 460px; width: 100%; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h2 { font-size: 1.8rem; margin-bottom: 0.4rem; }
        .auth-header p { color: var(--text-secondary); font-size: 0.9rem; }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--glass-border); }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="logo">TravelBuddy</a>
        </nav>

        <div class="auth-wrap">
            <div class="auth-card glass-card">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue planning your adventures</p>
                </div>

                <div id="alertbox" class="alert"></div>

                <div class="tabs">
                    <div class="tab-btn active" onclick="switchTab('login', this)">Sign In</div>
                    <div class="tab-btn" onclick="switchTab('register', this)">Create Account</div>
                </div>

                <!-- LOGIN FORM -->
                <div id="login" class="tab-panel active">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input id="loginEmail" type="email" class="form-input" placeholder="you@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input id="loginPassword" type="password" class="form-input" placeholder="••••••••" required>
                        </div>
                        <button id="loginBtn" type="submit" class="btn btn-primary btn-full">Sign In</button>
                    </form>
                </div>

                <!-- REGISTER FORM -->
                <div id="register" class="tab-panel">
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input id="regName" type="text" class="form-input" placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input id="regEmail" type="email" class="form-input" placeholder="you@email.com" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Password</label>
                                <input id="regPassword" type="password" class="form-input" placeholder="Min 8 chars" required>
                            </div>
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input id="regConfirm" type="password" class="form-input" placeholder="Repeat password" required>
                            </div>
                        </div>
                        <button id="regBtn" type="submit" class="btn btn-primary btn-full">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (api.getToken()) window.location.href = 'dashboard.html';

        function switchTab(name, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(name).classList.add('active');
            const h = document.querySelector('.auth-header h2');
            h.textContent = name === 'login' ? 'Welcome Back' : 'Create Your Account';
        }

        async function handleLogin(e) {
            e.preventDefault();
            setLoading('loginBtn', true);
            const res = await api.post('login', {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            }, false);
            setLoading('loginBtn', false, 'Sign In');
            if (res.error) { showAlert('alertbox', res.error); return; }
            api.setToken(res.data.access_token);
            api.setUser(res.data.user);
            window.location.href = 'dashboard.html';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const pw = document.getElementById('regPassword').value;
            const cf = document.getElementById('regConfirm').value;
            if (pw !== cf) { showAlert('alertbox', 'Passwords do not match.'); return; }
            setLoading('regBtn', true);
            const res = await api.post('register', {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: pw,
                password_confirmation: cf
            }, false);
            setLoading('regBtn', false, 'Create Account');
            if (res.error) {
                let msg = res.error;
                if (res.details) msg += '\n' + Object.values(res.details).flat().join(' ');
                showAlert('alertbox', msg); return;
            }
            api.setToken(res.data.access_token);
            api.setUser(res.data.user);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
